name: 🔍 Nightly Citation Check
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/verify.js
      - run: |
          git config user.name lexopen
          git config user.email lexopen@users.noreply.github.com
          git add -A
          git diff --quiet && echo OK || git commit -m "auto: update verification log" && git push
